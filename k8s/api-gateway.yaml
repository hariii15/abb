apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: campus-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        env:
        - name: GATEWAY_PORT
          value: "4000"
        - name: AUTH_URL
          value: "http://auth-service:4010"
        - name: ENERGY_URL
          value: "http://energy-service:4020"
        - name: CCTV_URL
          value: "http://cctv-service:4030"
        - name: NOTIFY_URL
          value: "http://notification-service:4040"
        - name: STORAGE_URL
          value: "http://storage-service:4050"
        - name: GATEWAY_SKIP_AUTH
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30400
