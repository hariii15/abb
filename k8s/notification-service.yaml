apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: campus-notification-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4040
        env:
        - name: NOTIFICATION_SERVICE_PORT
          value: "4040"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - protocol: TCP
      port: 4040
      targetPort: 4040
