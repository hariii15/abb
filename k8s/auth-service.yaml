apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: campus-auth-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4010
        env:
        - name: AUTH_SERVICE_PORT
          value: "4010"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - protocol: TCP
      port: 4010
      targetPort: 4010
