apiVersion: apps/v1
kind: Deployment
metadata:
  name: conveyor-service
  labels:
    app: conveyor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conveyor-service
  template:
    metadata:
      labels:
        app: conveyor-service
    spec:
      containers:
      - name: conveyor-service
        image: plc-conveyor-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4040
---
apiVersion: v1
kind: Service
metadata:
  name: conveyor-service
spec:
  selector:
    app: conveyor-service
  ports:
    - protocol: TCP
      port: 4040
      targetPort: 4040
