apiVersion: apps/v1
kind: Deployment
metadata:
  name: plc-dashboard
  labels:
    app: plc-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plc-dashboard
  template:
    metadata:
      labels:
        app: plc-dashboard
    spec:
      containers:
      - name: plc-dashboard
        image: plc-dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: plc-dashboard
spec:
  type: NodePort
  selector:
    app: plc-dashboard
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30300
