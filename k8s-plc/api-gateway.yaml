apiVersion: apps/v1
kind: Deployment
metadata:
  name: plc-api-gateway
  labels:
    app: plc-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plc-api-gateway
  template:
    metadata:
      labels:
        app: plc-api-gateway
    spec:
      containers:
      - name: api-gateway
        image: plc-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: plc-api-gateway
spec:
  type: NodePort
  selector:
    app: plc-api-gateway
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
      nodePort: 30400
