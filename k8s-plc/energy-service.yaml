apiVersion: apps/v1
kind: Deployment
metadata:
  name: energy-service
  labels:
    app: energy-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: energy-service
  template:
    metadata:
      labels:
        app: energy-service
    spec:
      containers:
      - name: energy-service
        image: plc-energy-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4070
---
apiVersion: v1
kind: Service
metadata:
  name: energy-service
spec:
  selector:
    app: energy-service
  ports:
    - protocol: TCP
      port: 4070
      targetPort: 4070
