apiVersion: apps/v1
kind: Deployment
metadata:
  name: motor-service
  labels:
    app: motor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: motor-service
  template:
    metadata:
      labels:
        app: motor-service
    spec:
      containers:
      - name: motor-service
        image: plc-motor-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4030
---
apiVersion: v1
kind: Service
metadata:
  name: motor-service
spec:
  selector:
    app: motor-service
  ports:
    - protocol: TCP
      port: 4030
      targetPort: 4030
