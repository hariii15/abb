apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-arm-service
  labels:
    app: robot-arm-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: robot-arm-service
  template:
    metadata:
      labels:
        app: robot-arm-service
    spec:
      containers:
      - name: robot-arm-service
        image: plc-robot-arm-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4050
---
apiVersion: v1
kind: Service
metadata:
  name: robot-arm-service
spec:
  selector:
    app: robot-arm-service
  ports:
    - protocol: TCP
      port: 4050
      targetPort: 4050
