apiVersion: apps/v1
kind: Deployment
metadata:
  name: plc-controller
  labels:
    app: plc-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plc-controller
  template:
    metadata:
      labels:
        app: plc-controller
    spec:
      containers:
      - name: plc-controller
        image: plc-plc-controller:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4010
---
apiVersion: v1
kind: Service
metadata:
  name: plc-controller
spec:
  selector:
    app: plc-controller
  ports:
    - protocol: TCP
      port: 4010
      targetPort: 4010
